apiVersion: v1
kind: Namespace
metadata:
  name: multi-agent
---
# Orchestrator Service
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: multi-agent
  labels:
    app: orchestrator
spec:
  selector:
    app: orchestrator
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: LoadBalancer
---
# Orchestrator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: multi-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: gcr.io/PROJECT_ID/multi-agent-orchestrator:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: production
        - name: FIRESTORE_MODE
          value: production
        - name: PROJECT_ID
          value: PROJECT_ID
        - name: MCP_TASK_HOST
          value: task
        - name: MCP_CALENDAR_HOST
          value: calendar
        - name: MCP_NOTES_HOST
          value: notes
        - name: MCP_CRITIC_HOST
          value: critic
        - name: MCP_AUDITOR_HOST
          value: auditor
        - name: MCP_EVENT_MONITOR_HOST
          value: event-monitor
        - name: MCP_RESEARCH_HOST
          value: research
        - name: MCP_NEWS_HOST
          value: news
        - name: LOG_LEVEL
          value: INFO
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      imagePullPolicy: IfNotPresent
---
