steps:
  # Step 1: Build Orchestrator image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-orchestrator'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-orchestrator:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-orchestrator:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    waitFor: ['-']

  # Step 2: Push Orchestrator image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-orchestrator'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-orchestrator:$COMMIT_SHA'
    waitFor: ['build-orchestrator']

  # Step 3: Build Task MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-task-mcp'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-task:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-task:latest'
      - '-f'
      - 'Dockerfile.mcp'
      - '--build-arg=MCP_SERVER=task'
      - '.'
    waitFor: ['-']

  # Step 4: Push Task MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-task-mcp'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-task:$COMMIT_SHA'
    waitFor: ['build-task-mcp']

  # Step 5: Build Calendar MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-calendar-mcp'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-calendar:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-calendar:latest'
      - '-f'
      - 'Dockerfile.mcp'
      - '--build-arg=MCP_SERVER=calendar'
      - '.'
    waitFor: ['-']

  # Step 6: Push Calendar MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-calendar-mcp'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-calendar:$COMMIT_SHA'
    waitFor: ['build-calendar-mcp']

  # Step 7: Build Notes MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-notes-mcp'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-notes:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-notes:latest'
      - '-f'
      - 'Dockerfile.mcp'
      - '--build-arg=MCP_SERVER=notes'
      - '.'
    waitFor: ['-']

  # Step 8: Push Notes MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-notes-mcp'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-notes:$COMMIT_SHA'
    waitFor: ['build-notes-mcp']

  # Step 9: Build Critic MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-critic-mcp'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-critic:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-critic:latest'
      - '-f'
      - 'Dockerfile.mcp'
      - '--build-arg=MCP_SERVER=critic'
      - '.'
    waitFor: ['-']

  # Step 10: Push Critic MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-critic-mcp'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-critic:$COMMIT_SHA'
    waitFor: ['build-critic-mcp']

  # Step 11: Build Auditor MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-auditor-mcp'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-auditor:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-auditor:latest'
      - '-f'
      - 'Dockerfile.mcp'
      - '--build-arg=MCP_SERVER=auditor'
      - '.'
    waitFor: ['-']

  # Step 12: Push Auditor MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-auditor-mcp'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-auditor:$COMMIT_SHA'
    waitFor: ['build-auditor-mcp']

  # Step 13: Build Event Monitor MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-event-monitor-mcp'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-event-monitor:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-event-monitor:latest'
      - '-f'
      - 'Dockerfile.mcp'
      - '--build-arg=MCP_SERVER=event_monitor'
      - '.'
    waitFor: ['-']

  # Step 14: Push Event Monitor MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-event-monitor-mcp'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-event-monitor:$COMMIT_SHA'
    waitFor: ['build-event-monitor-mcp']

  # Step 15: Build Research MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-research-mcp'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-research:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-research:latest'
      - '-f'
      - 'Dockerfile.mcp'
      - '--build-arg=MCP_SERVER=research'
      - '.'
    waitFor: ['-']

  # Step 16: Push Research MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-research-mcp'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-research:$COMMIT_SHA'
    waitFor: ['build-research-mcp']

  # Step 17: Build News MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-news-mcp'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-news:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/multi-agent-news:latest'
      - '-f'
      - 'Dockerfile.mcp'
      - '--build-arg=MCP_SERVER=news'
      - '.'
    waitFor: ['-']

  # Step 18: Push News MCP Server
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-news-mcp'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/multi-agent-news:$COMMIT_SHA'
    waitFor: ['build-news-mcp']

  # Step 19: Deploy Orchestrator
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-orchestrator'
    args:
      - '-f=.'
      - '-i=gcr.io/$PROJECT_ID/multi-agent-orchestrator:$COMMIT_SHA'
      - '-l=app=multi-agent-orchestrator'
      - '-L=gs://cloud-builders-gke-deploy'
      - '-n=default'
      - '-o=/workspace/output'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=us-central1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=multi-agent-cluster'
    waitFor: ['push-orchestrator']

images:
  - 'gcr.io/$PROJECT_ID/multi-agent-orchestrator:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-orchestrator:latest'
  - 'gcr.io/$PROJECT_ID/multi-agent-task:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-task:latest'
  - 'gcr.io/$PROJECT_ID/multi-agent-calendar:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-calendar:latest'
  - 'gcr.io/$PROJECT_ID/multi-agent-notes:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-notes:latest'
  - 'gcr.io/$PROJECT_ID/multi-agent-critic:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-critic:latest'
  - 'gcr.io/$PROJECT_ID/multi-agent-auditor:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-auditor:latest'
  - 'gcr.io/$PROJECT_ID/multi-agent-event-monitor:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-event-monitor:latest'
  - 'gcr.io/$PROJECT_ID/multi-agent-research:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-research:latest'
  - 'gcr.io/$PROJECT_ID/multi-agent-news:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/multi-agent-news:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  
timeout: '3600s'
